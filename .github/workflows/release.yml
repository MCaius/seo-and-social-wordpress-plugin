name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check PHP syntax
        run: npm run syntax:php

      - name: Run settings regression tests
        run: npm run test:settings

      - name: Run REST permission tests
        run: npm run test:rest-permission

      - name: Run access capability tests
        run: npm run test:access

      - name: Run LLMs output tests
        run: npm run test:llms

      - name: Lint PHP
        run: composer lint:php

      - name: Check Romanian translations
        run: msgfmt --check --verbose -o /tmp/seo-and-social-ro_RO.mo seo-and-social/languages/seo-and-social-ro_RO.po

      - name: Build release zip
        run: npm run build:zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: seo-and-social-release
          path: |
            dist/seo-and-social.zip
            dist/seo-and-social.manifest.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2
        with:
          files: |
            dist/seo-and-social.zip
            dist/seo-and-social.manifest.json
